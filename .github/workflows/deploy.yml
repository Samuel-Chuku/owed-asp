# CI/CD: every push to main runs the offline test suite + typecheck, then
# SSHes into the VPS and rebuilds the container from the fresh checkout.
# Required repo secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY (private key),
# optional VPS_PORT (default 22).

name: test-and-deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: production-deploy
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            cd ~/owed
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            sleep 5
            curl -sf http://127.0.0.1:8402/healthz
