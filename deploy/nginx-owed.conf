# Owed ASP — nginx site (VPS already runs nginx; Cloudflare DNS record stays
# DNS-only/grey so certbot can issue TLS).
#
# Install:
#   sudo cp deploy/nginx-owed.conf /etc/nginx/sites-available/owed
#   sudo ln -s /etc/nginx/sites-available/owed /etc/nginx/sites-enabled/owed
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d useowed.xyz     # adds the 443 block + renewal
#
# The MCP transport streams responses (SSE-style); proxy_buffering must stay
# off and read timeouts generous or long scans will drop mid-stream.

server {
    listen 80;
    listen [::]:80;
    server_name useowed.xyz;

    location / {
        proxy_pass http://127.0.0.1:8402;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        gzip on;
        gzip_types application/json text/html text/css application/javascript;
    }
}
